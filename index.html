<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        :root { --bg-card: #ffffff; --text-primary: #0f172a; --text-muted: #64748b; --accent-orange: #f97316; --border-subtle: #e2e8f0; --font-lg: 18px; --font-md: 14px; --font-sm: 12px; --radius-lg: 20px; --radius-md: 12px; --shadow-card: 0 25px 60px rgba(0, 0, 0, 0.06); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", sans-serif; }
        body { min-height: 100vh; padding: 40px 24px; color: var(--text-primary); background: radial-gradient(circle at top, #dbeafe, #f8fafc 40%, #eef2ff 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .app-header { width: 100%; max-width: 480px; text-align: center; margin-bottom: 24px; }
        .app-header h1 { font-size: 32px; font-weight: 800; color: var(--text-primary); margin-bottom: 8px; }
        .app-header p { font-size: var(--font-md); color: var(--text-muted); }
        .auth-card { width: 100%; max-width: 440px; background-color: var(--bg-card); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); border: 1px solid rgba(255, 255, 255, 0.7); padding: 36px; display: flex; flex-direction: column; gap: 24px; }
        .auth-card h2 { font-size: 24px; font-weight: 700; color: var(--text-primary); text-align: center; }
        .auth-form { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        .input-group { display: flex; flex-direction: column; gap: 8px; width: 100%; position: relative; }
        .input-group label { font-size: var(--font-sm); font-weight: 700; text-transform: uppercase; color: #475569; }
        .input-group input { width: 100%; height: 46px; padding: 0 16px; border-radius: var(--radius-md); border: 1px solid rgba(148, 163, 184, 0.3); background-color: #f8fafc; color: var(--text-primary); font-size: var(--font-md); outline: none; }
        .input-group input.password-input { padding-right: 60px; }
        .input-group input:focus { border-color: var(--accent-orange); background-color: #ffffff; box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1); }
        .password-toggle-link { position: absolute; right: 16px; bottom: 13px; font-size: var(--font-sm); font-weight: 700; color: var(--accent-orange); cursor: pointer; }
        .confirm-wrapper { display: none; flex-direction: column; gap: 8px; width: 100%; }
        .auth-submit-btn { width: 100%; height: 46px; border: none; border-radius: 999px; background-color: var(--text-primary); color: #ffffff; font-size: var(--font-md); font-weight: 700; cursor: pointer; margin-top: 4px; transition: all 0.2s; }
        .auth-submit-btn:hover { background-color: var(--accent-orange); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(249, 115, 22, 0.2); }
        .credentials-tip { font-size: 11px; font-weight: 600; color: var(--text-muted); background-color: #f1f5f9; padding: 10px 14px; border-radius: var(--radius-md); text-align: center; }
        .auth-footer { display: flex; justify-content: center; align-items: center; gap: 6px; font-size: var(--font-md); color: #475569; margin-top: 4px; border-top: 1px solid var(--border-subtle); padding-top: 20px; }
        .toggle-link-btn { background: none; border: none; color: var(--accent-orange); font-size: var(--font-md); font-weight: 700; cursor: pointer; text-decoration: underline; }
        @media (max-width: 500px) { body { padding: 20px 16px; } .auth-card { padding: 24px; } .app-header h1 { font-size: 26px; } }
    </style>
</head>
<body>

<header class="app-header">
    <h1>Data Tracker</h1>
    <p>Track your business finances, income, and expenses easily.</p>
</header>

<div class="auth-card">
    <h2 id="viewHeading">Login</h2>

    <form class="auth-form" id="portalAuthForm">
        <div class="input-group">
            <label for="usernameField">Username</label>
            <input type="text" id="usernameField" required placeholder="Username">
        </div>
        <div class="input-group">
            <label for="passwordField">Password</label>
            <input type="password" id="passwordField" class="password-input" required placeholder="••••••••">
            <span class="password-toggle-link" id="togglePasswordText">Show</span>
        </div>
        <div class="confirm-wrapper" id="confirmPasswordWrapper">
            <div class="input-group">
                <label for="confirmPasswordField">Confirm Password</label>
                <input type="password" id="confirmPasswordField" class="password-input" placeholder="••••••••">
                <span class="password-toggle-link" id="toggleConfirmText">Show</span>
            </div>
        </div>
        <button type="submit" class="auth-submit-btn" id="actionBtn">Login</button>
    </form>

    <div class="credentials-tip">
        Your data is saved separately and securely in this account.
    </div>

    <div class="auth-footer">
        <span id="switchContextText">Need an account?</span>
        <button type="button" class="toggle-link-btn" id="uiToggleBtn">Sign Up</button>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        let currentFormMode = "LOGIN";
        const expenseVariables = ["gas", "electricity", "water", "rent", "phoneWifi", "cellphone", "website", "trash", "accountedFees", "tax", "salary", "repair", "supplies", "merchantFees", "other"];
        const uiToggleBtn = document.getElementById("uiToggleBtn");
        const portalAuthForm = document.getElementById("portalAuthForm");
        const viewHeading = document.getElementById("viewHeading");
        const actionBtn = document.getElementById("actionBtn");
        const switchContextText = document.getElementById("switchContextText");
        const confirmPasswordWrapper = document.getElementById("confirmPasswordWrapper");
        const confirmPasswordField = document.getElementById("confirmPasswordField");
        const togglePasswordText = document.getElementById("togglePasswordText");
        const toggleConfirmText = document.getElementById("toggleConfirmText");

        function bindPasswordToggle(labelEl, inputEl) {
            labelEl.addEventListener("click", () => {
                if (inputEl.type === "password") { inputEl.type = "text"; labelEl.textContent = "Hide"; }
                else { inputEl.type = "password"; labelEl.textContent = "Show"; }
            });
        }
        bindPasswordToggle(togglePasswordText, document.getElementById("passwordField"));
        bindPasswordToggle(toggleConfirmText, confirmPasswordField);

        uiToggleBtn.addEventListener("click", () => {
            if (currentFormMode === "LOGIN") {
                currentFormMode = "CREATE"; viewHeading.textContent = "Create Account"; actionBtn.textContent = "Sign Up"; switchContextText.textContent = "Have an account?"; uiToggleBtn.textContent = "Login"; confirmPasswordWrapper.style.display = "flex"; confirmPasswordField.required = true;
            } else {
                currentFormMode = "LOGIN"; viewHeading.textContent = "Login"; actionBtn.textContent = "Login"; switchContextText.textContent = "Need an account?"; uiToggleBtn.textContent = "Sign Up"; confirmPasswordWrapper.style.display = "none"; confirmPasswordField.required = false; confirmPasswordField.value = "";
            }
        });

        portalAuthForm.addEventListener("submit", (e) => {
            e.preventDefault();
            const usernameRaw = document.getElementById("usernameField").value.trim();
            const usernameValue = usernameRaw.toLowerCase();
            const passwordValue = document.getElementById("passwordField").value;
            let registeredUsers = JSON.parse(localStorage.getItem("registeredUsers")) || [];

            if (currentFormMode === "CREATE") {
                if (passwordValue !== confirmPasswordField.value) { alert("Passwords do not match!"); return; }
                if (registeredUsers.some(u => u.username === usernameValue)) { alert("Username already exists."); return; }
                registeredUsers.push({ username: usernameValue, password: passwordValue });
                localStorage.setItem("registeredUsers", JSON.stringify(registeredUsers));
                alert("Account created! Logging in...");
                uiToggleBtn.click();
            } else {
                const validUser = registeredUsers.find(u => u.username === usernameValue && u.password === passwordValue);
                if (!validUser) { alert("Wrong username or password."); return; }
                localStorage.setItem("currentUser", usernameRaw);
                const userStorageKey = `records_${usernameValue}`;
                let userSpecificRecords = JSON.parse(localStorage.getItem(userStorageKey));
                if (!userSpecificRecords || userSpecificRecords.length === 0) {
                    let initialZeroedRecord = { month: "January", year: new Date().getFullYear(), totalCost: 0, entries: [{ bills: {} }] };
                    expenseVariables.forEach(key => { initialZeroedRecord.entries[0].bills[key] = 0; });
                    localStorage.setItem(userStorageKey, JSON.stringify([initialZeroedRecord]));
                    localStorage.setItem("records", JSON.stringify([initialZeroedRecord]));
                } else {
                    localStorage.setItem("records", JSON.stringify(userSpecificRecords));
                }
                alert("Welcome back!");
                window.location.href = "Website.html";
            }
        });
    });
</script>
</body>
</html>
